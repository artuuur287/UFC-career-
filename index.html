<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UFC Career</title>

<style>

body {
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}


.screen {
    padding-top:60px;
}


h1 {
    font-size:42px;
}

p {
    font-size:22px;
}


button {
    font-size:22px;
    padding:15px 30px;
    margin:15px;
    background:#d00000;
    color:white;
    border:none;
    border-radius:10px;
}


input {
    font-size:22px;
    padding:10px;
}


.hidden {
    display:none;
}


.office {
    width:80%;
    margin-top:50px;
    cursor:pointer;
}


.card {
    background:#222;
    padding:25px;
    margin:20px;
    border-radius:15px;
}


.menuBtn {

    position:fixed;

    top:0;
    left:0;

    font-size:18px;

    padding:8px 15px;

    background:#d00000;

    color:white;

    border:none;

    border-radius:0 0 10px 0;

    z-index:1000;

}

</style>

</head>


<body>


<button id="menuButton" class="menuBtn hidden" onclick="goMenu()">
☰ Меню
</button>



<div id="nameScreen" class="screen">

<h1>🥊 UFC Career</h1>

<p>Введите имя бойца:</p>

<input id="fighterName" placeholder="Имя">

<br>

<button onclick="nextStep()">
Далее
</button>

</div>



<div id="weightScreen" class="screen hidden">

<h1>Выберите вес</h1>


<button onclick="createFighter('Лёгкий вес','72 кг')">
🥊 Лёгкий вес<br>72 кг
</button>


<br>


<button onclick="createFighter('Средний вес','84 кг')">
🥊 Средний вес<br>84 кг
</button>


<br>


<button onclick="createFighter('Тяжёлый вес','96 кг')">
🥊 Тяжёлый вес<br>96 кг
</button>

</div>



<div id="menu" class="screen hidden">

<h1>🥊 UFC Career</h1>

<p>Выберите здание</p>


<img class="office"
src="Picsart_26-07-09_19-52-52-758.png"
onclick="openProfile()">



<p>Офис UFC</p>

</div>




<div id="profile" class="screen hidden">

<div class="card">

<h1>🥊 Профиль бойца</h1>

<p id="name"></p>

<p id="weight"></p>

<p>Рейтинг: #15</p>

<p>Рекорд: 10-0</p>


<button onclick="changeWeight()">
Изменить вес
</button>

</div>

</div>




<div id="change" class="screen hidden">

<h1>Выбери новый вес</h1>


<button onclick="setWeight('Лёгкий вес','72 кг')">
72 кг
</button>


<button onclick="setWeight('Средний вес','84 кг')">
84 кг
</button>


<button onclick="setWeight('Тяжёлый вес','96 кг')">
96 кг
</button>


</div>




<script>

let fighterName="";
let fighterWeight="";


function nextStep(){

fighterName=document.getElementById("fighterName").value;

if(fighterName==""){
alert("Введите имя!");
return;
}

document.getElementById("nameScreen").style.display="none";

document.getElementById("weightScreen").style.display="block";

}



function createFighter(weight,kg){

fighterWeight=weight+" "+kg;

document.getElementById("weightScreen").style.display="none";

document.getElementById("menu").style.display="block";

document.getElementById("menuButton").style.display="block";

}



function openProfile(){

document.getElementById("menu").style.display="none";

document.getElementById("profile").style.display="block";


document.getElementById("name").innerHTML=
"Имя: 🥊 "+fighterName;


document.getElementById("weight").innerHTML=
"Вес: "+fighterWeight;

}



function changeWeight(){

document.getElementById("profile").style.display="none";

document.getElementById("change").style.display="block";

}



function setWeight(weight,kg){

fighterWeight=weight+" "+kg;

document.getElementById("change").style.display="none";

document.getElementById("profile").style.display="block";


document.getElementById("weight").innerHTML=
"Вес: "+fighterWeight;

}



function goMenu(){

document.getElementById("profile").style.display="none";

document.getElementById("change").style.display="none";

document.getElementById("menu").style.display="block";

}

</script>


</body>

  </html>
