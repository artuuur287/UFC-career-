<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFC Career</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#111;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .menu{
            text-align:center;
        }

        h1{
            font-size:60px;
            margin-bottom:25px;
        }

        p{
            font-size:26px;
            margin-bottom:40px;
        }

        button{
            font-size:30px;
            padding:18px 40px;
            border:none;
            border-radius:12px;
            background:#d40000;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#ff0000;
        }
    </style>
</head>

<body>

<div class="menu">
    <h1>🥊 UFC Career</h1>
    <p>Создай своего бойца и начни путь к чемпионскому поясу!</p>

    <button onclick="alert('Создание бойца скоро будет!')">
        Начать карьеру
    </button>
</div>

</body>
</html>
