<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UFC Career</title>

<style>

body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 80px;
}

h1 {
    font-size: 70px;
    margin-bottom: 40px;
}

p {
    font-size: 40px;
    margin-bottom: 50px;
}

button {
    font-size: 40px;
    padding: 25px 60px;
    background: #d00000;
    color: white;
    border: none;
    border-radius: 15px;
}

input {
    font-size: 35px;
    padding: 15px;
    width: 80%;
    border-radius: 10px;
}

.hidden {
    display: none;
}

.card {
    background: #222;
    padding: 30px;
    margin: 20px;
    border-radius: 20px;
}

</style>

</head>

<body>


<div id="start">

<h1>🥊 UFC Career</h1>

<p>
Создай своего бойца и начни путь к чемпионскому поясу!
</p>

<button onclick="startGame()">
Начать карьеру
</button>

</div>



<div id="create" class="hidden">

<h1>Создание бойца</h1>

<p>Введите имя бойца:</p>

<input id="name" placeholder="Имя">


<br><br>

<button onclick="createFighter()">
Создать бойца
</button>

</div>



<div id="fighter" class="hidden">

<div class="card">

<h1>🥊 Твой боец</h1>

<p id="fighterName"></p>

<p>
Вес: неизвестен
</p>

<p>
Рейтинг UFC: #15
</p>

<p>
Победы: 0<br>
Поражения: 0
</p>

</div>

</div>



<script>

function startGame(){

document.getElementById("start").style.display="none";

document.getElementById("create").style.display="block";

}



function createFighter(){

let name = document.getElementById("name").value;


if(name == ""){

alert("Введите имя бойца!");

return;

}


document.getElementById("create").style.display="none";

document.getElementById("fighter").style.display="block";


document.getElementById("fighterName").innerHTML =
"🥊 " + name;

}

</script>


</body>
</html>
