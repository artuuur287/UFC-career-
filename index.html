<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UFC Career</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 60px;
}

h1 {
    font-size: 50px;
}

p {
    font-size: 25px;
}

button {
    font-size: 25px;
    padding: 15px 35px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
}

input {
    font-size: 25px;
    padding: 10px;
    border-radius: 8px;
    margin: 20px;
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<div id="start">
    <h1>🥊 UFC Career</h1>

    <p>Создай своего бойца и начни путь к чемпионскому поясу!</p>

    <button onclick="startGame()">
        Начать карьеру
    </button>
</div>


<div id="create" class="hidden">

    <h1>Создание бойца</h1>

    <p>Введите имя бойца:</p>

    <input id="name" placeholder="Имя">

    <br>

    <button onclick="createFighter()">
        Создать бойца
    </button>

</div>


<div id="fighter" class="hidden">

    <h1>🥊 Твой боец</h1>

    <p id="fighterName"></p>

    <p>Рейтинг UFC: #15</p>
    <p>Победы: 0 | Поражения: 0</p>

</div>


<script>

function startGame() {
    document.getElementById("start").style.display = "none";
    document.getElementById("create").style.display = "block";
}


function createFighter() {

    let name = document.getElementById("name").value;

    if(name == "") {
        alert("Введите имя бойца!");
        return;
    }

    document.getElementById("create").style.display = "none";
    document.getElementById("fighter").style.display = "block";

    document.getElementById("fighterName").innerHTML =
    "🥊 " + name;

}

</script>


</body>
</html>
